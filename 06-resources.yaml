apiVersion: v1
kind: Pod
metadata:
  name: resources-demo
spec:
  containers:
  - name: nginx
    image: nginx
    resources:
      #soft limit
        requests:
          memory: "64mi" #RAM
          cpu: "100m" #CPU
      #hard limit
        limits:
          memory: "120mi" #RAM
          cpu: "120m" #CPU
          
